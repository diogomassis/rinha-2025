syntax = "proto3";

package rinha_2025;

import "google/api/annotations.proto";

option go_package = "github.com/diogomassis/rinha-2025/proto";

message TestRequest {
}

message TestResponse {
  string result = 1;
}

service TestService {
  rpc Test(TestRequest) returns (TestResponse) {
    option (google.api.http) = {
      get: "/v1/test"
    };
  }
}
