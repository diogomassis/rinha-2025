services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app1
      - app2

  app1:
    build: ./app
    environment:
      - INSTANCE_NAME=App-01

  app2:
    build: ./app
    environment:
      - INSTANCE_NAME=App-02
