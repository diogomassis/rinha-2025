services:
  # Backend applications
  app1:
    image: rinha-2025
    environment:
      - INSTANCE_NAME=App-01
  app2:
    image: rinha-2025
    environment:
      - INSTANCE_NAME=App-02

  # Nginx web server
  nginx:
    image: nginx:alpine
    ports:
      - "9999:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app1
      - app2

  app1:
    image: rinha-2025
    environment:
      - INSTANCE_NAME=App-01

  app2:
    image: rinha-2025
    environment:
      - INSTANCE_NAME=App-02
