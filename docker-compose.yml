services:
  # Backend applications
  app1:
    image: rinha-2025
    environment:
      - INSTANCE_NAME=App-01
  app2:
    image: rinha-2025
    environment:
      - INSTANCE_NAME=App-02

  # Nginx web server
  nginx:
    image: nginx:alpine
    ports:
      - "9999:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app1
      - app2

  # NATS messaging server
  nats:
    image: nats:latest
    container_name: nats-server
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped
    volumes:
      - ./nats-data:/data

  # Redis in-memory data store
  redis:
    image: "redis:latest"
    container_name: redis-server
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    restart: unless-stopped

# Volumes for persistent data storage
volumes:
  redis-data:
  nats-data:
